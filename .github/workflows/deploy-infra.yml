name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths: ['infra/**']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SP Object ID
        id: sp
        run: |
          OID=$(az ad sp show --id ${{ secrets.AZURE_CLIENT_ID }} --query id -o tsv)
          echo "objectId=$OID" >> "$GITHUB_OUTPUT"

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        id: bicep
        with:
          scope: resourceGroup
          resourceGroupName: rg-nao
          template: infra/main.bicep
          parameters: >-
            pgAdminPassword=${{ secrets.PG_ADMIN_PASSWORD }}
            deploymentPrincipalId=${{ steps.sp.outputs.objectId }}
          deploymentName: nao-infra-${{ github.run_number }}

      - name: Wait for RBAC propagation
        run: sleep 60

      - name: Re-authenticate to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Populate Key Vault Secrets
        run: |
          KV_NAME="${{ steps.bicep.outputs.keyVaultName }}"
          PG_FQDN="${{ steps.bicep.outputs.postgresFqdn }}"
          DB_URI="postgres://naoadmin:${{ secrets.PG_ADMIN_PASSWORD }}@${PG_FQDN}:5432/nao"

          az keyvault secret set --vault-name "$KV_NAME" --name "DB-URI" --value "$DB_URI"
          az keyvault secret set --vault-name "$KV_NAME" --name "ANTHROPIC-API-KEY" --value "${{ secrets.ANTHROPIC_API_KEY }}"
          az keyvault secret set --vault-name "$KV_NAME" --name "FABRIC-SP-CLIENT-ID" --value "${{ secrets.FABRIC_SP_CLIENT_ID }}"
          az keyvault secret set --vault-name "$KV_NAME" --name "FABRIC-SP-SECRET" --value "${{ secrets.FABRIC_SP_SECRET }}"
          az keyvault secret set --vault-name "$KV_NAME" --name "BETTER-AUTH-SECRET" --value "${{ secrets.BETTER_AUTH_SECRET }}"

      - name: Configure Container App secrets and env vars
        run: |
          RG="${{ steps.bicep.outputs.resourceGroupName }}"
          KV_NAME="${{ steps.bicep.outputs.keyVaultName }}"
          FQDN="${{ steps.bicep.outputs.containerAppFqdn }}"

          # Wait for managed identity propagation
          sleep 30

          # Add Key Vault secret references to Container App
          az containerapp secret set \
            --name ca-nao \
            --resource-group "$RG" \
            --secrets \
              db-uri=keyvaultref:https://${KV_NAME}.vault.azure.net/secrets/DB-URI,identityref:system \
              anthropic-api-key=keyvaultref:https://${KV_NAME}.vault.azure.net/secrets/ANTHROPIC-API-KEY,identityref:system \
              fabric-sp-client-id=keyvaultref:https://${KV_NAME}.vault.azure.net/secrets/FABRIC-SP-CLIENT-ID,identityref:system \
              fabric-sp-secret=keyvaultref:https://${KV_NAME}.vault.azure.net/secrets/FABRIC-SP-SECRET,identityref:system \
              better-auth-secret=keyvaultref:https://${KV_NAME}.vault.azure.net/secrets/BETTER-AUTH-SECRET,identityref:system

          # Set env vars referencing secrets + update BETTER_AUTH_URL
          az containerapp update \
            --name ca-nao \
            --resource-group "$RG" \
            --set-env-vars \
              "DB_URI=secretref:db-uri" \
              "ANTHROPIC_API_KEY=secretref:anthropic-api-key" \
              "FABRIC_SP_CLIENT_ID=secretref:fabric-sp-client-id" \
              "FABRIC_SP_SECRET=secretref:fabric-sp-secret" \
              "BETTER_AUTH_SECRET=secretref:better-auth-secret" \
              "BETTER_AUTH_URL=https://${FQDN}"
