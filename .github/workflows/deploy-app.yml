name: Deploy Application

on:
  push:
    branches: [main]
    paths-ignore: ['infra/**', 'docs/**', '*.md', '!RULES.md']
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore: ['infra/**', 'docs/**', '*.md', '!RULES.md']
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jonvoge/nao-context
  APP_NAME: ca-nao
  RESOURCE_GROUP: rg-nao-northeurope

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event_name == 'push' && 'latest' || format('pr-{0}', github.event.pull_request.number) }}

  deploy-production:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps
        run: |
          az containerapp registry set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --server ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GHCR_TOKEN }}

          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}

  deploy-preview:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Derive revision label
        id: label
        run: |
          RAW="pr-${{ github.event.pull_request.number }}"
          LABEL=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | head -c 64)
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Ensure multi-revision mode
        run: |
          az containerapp revision set-mode \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --mode multiple

      - name: Deploy preview revision
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          PREVIEW_URL="https://${{ steps.label.outputs.label }}--${FQDN}"

          az containerapp registry set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --server ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GHCR_TOKEN }}

          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }} \
            --revision-suffix ${{ steps.label.outputs.label }} \
            --set-env-vars "BETTER_AUTH_URL=${PREVIEW_URL}"

          az containerapp ingress traffic set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --label-weight ${{ steps.label.outputs.label }}=0

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const label = '${{ steps.label.outputs.label }}';
            const fqdn = await (async () => {
              const { execSync } = require('child_process');
              return execSync('az containerapp show --name ${{ env.APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv').toString().trim();
            })();
            const previewUrl = `https://${label}--${fqdn}`;
            const body = `🔍 **Preview deployed**: [${previewUrl}](${previewUrl})\n\nRevision label: \`${label}\` (0% production traffic)`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('Preview deployed'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
